name: Linux

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build-and-smoke:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Ubuntu 24.04
            image: ubuntu:24.04
            artifact: plusplus-linux-ubuntu-24.04
          - name: Debian 12
            image: debian:12
            artifact: plusplus-linux-debian-12
          - name: Fedora latest
            image: fedora:latest
            artifact: plusplus-linux-fedora-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and smoke-run in ${{ matrix.name }}
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            -e CARGO_HOME=/workspace/target/ci-cargo-home \
            -e RUSTUP_HOME=/workspace/target/ci-rustup-home \
            ${{ matrix.image }} \
            bash -lc '
              set -euo pipefail
              scripts/linux-build.sh --install-deps --install-rust --release --smoke
              source "${CARGO_HOME}/env"
              rustup show
            '

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/plusplus
          if-no-files-found: error
