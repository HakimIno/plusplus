name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Add Apple targets
        run: |
          rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Import Apple Developer ID certificate
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE_BASE64:-}" ]; then
            echo "::notice::Apple Developer ID is not configured; the release will not be notarized"
            exit 0
          fi
          CERTIFICATE_PATH="${RUNNER_TEMP}/plusplus-signing.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/plusplus-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build universal .app + .dmg
        env:
          MACOS_SIGN_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: scripts/release.sh --universal

      - name: Notarize and staple DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
            echo "::notice::Skipping notarization because Apple signing is not configured"
            exit 0
          fi
          if [ -z "${APPLE_ID:-}" ] || [ -z "${APPLE_TEAM_ID:-}" ] || [ -z "${APPLE_APP_PASSWORD:-}" ]; then
            echo "::error::Apple signing identity exists but notarization secrets are incomplete"
            exit 1
          fi
          for dmg in target/dist/plusplus-*.dmg; do
            xcrun notarytool submit "$dmg" --wait \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD"
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
          done

      # Sign every DMG with the project's minisign key so the in-app updater (which verifies
      # the signature against the public key baked into the binary) will accept it. This is
      # mandatory: a release with no signature is refused by clients, so fail loudly here if
      # the signing secret is missing rather than shipping an un-updatable build.
      - name: Sign DMGs (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — releases must be signed. See docs/RELEASE_SIGNING.md"
            exit 1
          fi
          brew install minisign
          KEYFILE="$(mktemp)"
          trap 'rm -f "${KEYFILE}"' EXIT
          printf '%s\n' "${MINISIGN_SECRET_KEY}" > "${KEYFILE}"
          for dmg in target/dist/plusplus-*.dmg; do
            echo "→ signing ${dmg}"
            printf '%s' "${MINISIGN_PASSWORD:-}" | minisign -S -s "${KEYFILE}" -m "${dmg}"
          done
          ls -l target/dist/plusplus-*.dmg.minisig

      - name: Stage macOS release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            target/dist/plusplus-*.dmg
            target/dist/plusplus-*.dmg.minisig
          if-no-files-found: error

  linux:
    runs-on: ubuntu-latest
    container: debian:12
    # Container jobs default to `sh`, which rejects `set -o pipefail` — force bash.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Build and smoke-run
        run: scripts/linux-build.sh --install-deps --install-rust --release --smoke

      - name: Build AppImage
        run: packaging/linux/make-appimage.sh

      - name: Smoke-run AppImage
        run: |
          set +e
          APPIMAGE_EXTRACT_AND_RUN=1 xvfb-run -a timeout 8s target/dist/plusplus-*-x86_64.AppImage
          status=$?
          set -e
          if [ "$status" -ne 0 ] && [ "$status" -ne 124 ]; then
            echo "AppImage smoke run failed with exit code ${status}" >&2
            exit "$status"
          fi

      - name: Sign AppImage (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — releases must be signed. See docs/RELEASE_SIGNING.md"
            exit 1
          fi
          apt-get update
          apt-get install -y --no-install-recommends minisign
          KEYFILE="$(mktemp)"
          trap 'rm -f "${KEYFILE}"' EXIT
          printf '%s\n' "${MINISIGN_SECRET_KEY}" > "${KEYFILE}"
          for appimage in target/dist/plusplus-*.AppImage; do
            echo "→ signing ${appimage}"
            printf '%s' "${MINISIGN_PASSWORD:-}" | minisign -S -s "${KEYFILE}" -m "${appimage}"
          done

      - name: Stage Linux release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            target/dist/plusplus-*.AppImage
            target/dist/plusplus-*.AppImage.minisig
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release -p plusplus-app

      - name: Authenticode sign executable
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERTIFICATE_BASE64) {
            Write-Host "::notice::Windows signing certificate is not configured; skipping Authenticode"
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "plusplus-signing.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          )
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signTool) { throw "signtool.exe was not found" }
          & $signTool.FullName sign /f $certificatePath /p $env:WINDOWS_CERTIFICATE_PASSWORD `
            /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 target/release/plusplus.exe
          if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }
          & $signTool.FullName verify /pa /v target/release/plusplus.exe
          if ($LASTEXITCODE -ne 0) { throw "signature verification failed" }

      - name: Package portable zip
        run: packaging/windows/make-zip.sh

      - name: Stage Windows release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: target/dist/plusplus-*-windows.zip
          if-no-files-found: error

  publish:
    needs: [macos, linux, windows]
    runs-on: ubuntu-latest
    steps:
      - name: Collect release assets
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      # The Windows zip is built on a runner where installing minisign is flaky, so it is
      # signed here instead — same key, same verification path as the DMG/AppImage. Keeps
      # the invariant that every published asset ships with a .minisig.
      - name: Sign Windows zip (minisign)
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${MINISIGN_SECRET_KEY:-}" ]; then
            echo "::error::MINISIGN_SECRET_KEY secret is not set — releases must be signed. See docs/RELEASE_SIGNING.md"
            exit 1
          fi
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends minisign
          KEYFILE="$(mktemp)"
          trap 'rm -f "${KEYFILE}"' EXIT
          printf '%s\n' "${MINISIGN_SECRET_KEY}" > "${KEYFILE}"
          for zip in release-assets/plusplus-*-windows.zip; do
            echo "→ signing ${zip}"
            printf '%s' "${MINISIGN_PASSWORD:-}" | minisign -S -s "${KEYFILE}" -m "${zip}"
          done
          ls -l release-assets/plusplus-*-windows.zip.minisig

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
