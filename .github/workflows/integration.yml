name: Database integration

on:
  pull_request:
    paths:
      - "crates/core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/integration.yml"
  push:
    branches: [develop]
    paths:
      - "crates/core/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/integration.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  postgres:
    runs-on: ubuntu-latest
    services:
      database:
        image: postgres:17
        env:
          POSTGRES_USER: plusplus
          POSTGRES_PASSWORD: plusplus-ci-password
          POSTGRES_DB: plusplus_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U plusplus -d plusplus_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: PostgreSQL live smoke test
        env:
          PLUSPLUS_LIVE_KIND: postgres
          PLUSPLUS_LIVE_HOST: 127.0.0.1
          PLUSPLUS_LIVE_PORT: "5432"
          PLUSPLUS_LIVE_USER: plusplus
          PLUSPLUS_LIVE_PASSWORD: plusplus-ci-password
          PLUSPLUS_LIVE_DATABASE: plusplus_ci
        run: cargo test -p plusplus-core --test live_backends -- --ignored --nocapture

  mysql:
    runs-on: ubuntu-latest
    services:
      database:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: plusplus-ci-root-password
          MYSQL_DATABASE: plusplus_ci
          MYSQL_USER: plusplus
          MYSQL_PASSWORD: plusplus-ci-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost -pplusplus-ci-root-password"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: MySQL live smoke test
        env:
          PLUSPLUS_LIVE_KIND: mysql
          PLUSPLUS_LIVE_HOST: 127.0.0.1
          PLUSPLUS_LIVE_PORT: "3306"
          PLUSPLUS_LIVE_USER: plusplus
          PLUSPLUS_LIVE_PASSWORD: plusplus-ci-password
          PLUSPLUS_LIVE_DATABASE: plusplus_ci
        run: cargo test -p plusplus-core --test live_backends -- --ignored --nocapture

  sqlserver:
    runs-on: ubuntu-latest
    services:
      database:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: Plusplus-CI-Password-2026!
        ports:
          - 1433:1433
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Wait for SQL Server
        run: |
          for attempt in {1..60}; do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/1433' 2>/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "SQL Server did not become ready" >&2
          exit 1
      - name: SQL Server live smoke test
        env:
          PLUSPLUS_LIVE_KIND: sqlserver
          PLUSPLUS_LIVE_HOST: 127.0.0.1
          PLUSPLUS_LIVE_PORT: "1433"
          PLUSPLUS_LIVE_USER: sa
          PLUSPLUS_LIVE_PASSWORD: Plusplus-CI-Password-2026!
          PLUSPLUS_LIVE_DATABASE: master
        run: cargo test -p plusplus-core --test live_backends -- --ignored --nocapture
