<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#191a22"/>
      <stop offset="1" stop-color="#0a0a0c"/>
    </linearGradient>
    <radialGradient id="glow" cx="512" cy="512" r="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6e8eff" stop-opacity="0.38"/>
      <stop offset="0.7" stop-color="#6e8eff" stop-opacity="0.06"/>
