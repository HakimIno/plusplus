  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#tile)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="229" fill="url(#glow)"/>
  <rect x="2" y="2" width="1020" height="1020" rx="227" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="4"/>
  <g fill="url(#ink)">
    <!-- plus 1 -->
    <rect x="244" y="470" width="256" height="84" rx="42"/>
