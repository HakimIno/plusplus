<?xml version="1.0" encoding="UTF-8"?>
<!-- Background for the installer DMG window (660x400 points).
     Icon slots in make-dmg.sh: app at (165,185), Applications at (495,185).
     Rendered to background.tiff (1x + 2x) by build-background.sh. -->
<svg width="660" height="400" viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .doodle-outline { fill: none; stroke: #2d3436; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Warm cream canvas -->
  <rect width="660" height="400" fill="#fff5e8"/>

  <!-- Pink accent strip (reference-style sidebar) -->
  <rect x="0" y="0" width="22" height="400" fill="#f5a8b8"/>
  <circle cx="11" cy="72" r="4" fill="#ffd93d" stroke="#2d3436" stroke-width="1.5"/>
  <circle cx="11" cy="118" r="3" fill="#4d96ff" stroke="#2d3436" stroke-width="1.5"/>

  <!-- Main green panel -->
  <rect x="34" y="36" width="592" height="312" rx="26" fill="#6bcb77" stroke="#2d3436" stroke-width="3"/>

  <!-- Soft corner blobs on the panel -->
  <circle cx="78" cy="78" r="16" fill="#ffd93d" stroke="#2d3436" stroke-width="2.5"/>
  <circle cx="598" cy="92" r="11" fill="#ff9f43" stroke="#2d3436" stroke-width="2.5"/>
  <circle cx="612" cy="310" r="9" fill="#f5a8b8" stroke="#2d3436" stroke-width="2"/>

  <!-- Little orange flower (bottom-left doodle) -->
  <g transform="translate(62 318)">
    <ellipse cx="0" cy="-10" rx="7" ry="11" fill="#ff9f43" stroke="#2d3436" stroke-width="2"/>
    <ellipse cx="-9" cy="-2" rx="7" ry="11" fill="#ff9f43" stroke="#2d3436" stroke-width="2" transform="rotate(-55)"/>
    <ellipse cx="9" cy="-2" rx="7" ry="11" fill="#ff9f43" stroke="#2d3436" stroke-width="2" transform="rotate(55)"/>
    <ellipse cx="-7" cy="8" rx="7" ry="11" fill="#ff9f43" stroke="#2d3436" stroke-width="2" transform="rotate(-115)"/>
    <ellipse cx="7" cy="8" rx="7" ry="11" fill="#ff9f43" stroke="#2d3436" stroke-width="2" transform="rotate(115)"/>
    <circle cx="0" cy="0" r="6" fill="#ffd93d" stroke="#2d3436" stroke-width="2"/>
    <path d="M 0 6 Q 4 18 2 28" class="doodle-outline" stroke="#fff8f0" stroke-width="4"/>
    <path d="M 0 6 Q 4 18 2 28" class="doodle-outline" stroke-width="2.5"/>
  </g>

  <!-- Bee doodle (top-right) -->
  <g transform="translate(578 68)">
    <ellipse cx="0" cy="0" rx="13" ry="11" fill="#ffd93d" stroke="#2d3436" stroke-width="2.5"/>
    <path d="M -10 -2 H 10 M -10 4 H 10" class="doodle-outline" stroke-width="2.5"/>
    <ellipse cx="-14" cy="-4" rx="7" ry="4" fill="#fff8f0" stroke="#2d3436" stroke-width="2" transform="rotate(-25)"/>
    <ellipse cx="14" cy="-4" rx="7" ry="4" fill="#fff8f0" stroke="#2d3436" stroke-width="2" transform="rotate(25)"/>
    <circle cx="6" cy="-3" r="1.5" fill="#2d3436"/>
  </g>

  <!-- Mushroom doodle (top-left) -->
  <g transform="translate(108 72)">
    <rect x="-7" y="2" width="14" height="16" rx="3" fill="#fff8f0" stroke="#2d3436" stroke-width="2"/>
    <path d="M -14 4 Q 0 -12 14 4 Z" fill="#ff9f43" stroke="#2d3436" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="-5" cy="0" r="2.5" fill="#fff8f0" stroke="#2d3436" stroke-width="1.5"/>
    <circle cx="5" cy="2" r="2" fill="#fff8f0" stroke="#2d3436" stroke-width="1.5"/>
  </g>

  <!-- Title -->
  <text x="330" y="68" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="28" font-weight="700"
        fill="#2d3436">plusplus</text>
  <path d="M 268 76 Q 330 84 392 76" class="doodle-outline" stroke="#2d3436" stroke-width="2.5"/>

  <!-- Wavy drag stroke between icon slots (hand-drawn stem style) -->
  <path d="M 178 292
           C 212 288, 238 338, 278 332
           C 318 326, 342 278, 382 292
           C 422 306, 448 328, 482 298"
        class="doodle-outline" stroke="#2d3436" stroke-width="8"/>
  <path d="M 178 292
           C 212 288, 238 338, 278 332
           C 318 326, 342 278, 382 292
           C 422 306, 448 328, 482 298"
        class="doodle-outline" stroke="#fff8f0" stroke-width="4.5"/>

  <!-- Drag start/end dots -->
  <circle cx="178" cy="292" r="7" fill="#4d96ff" stroke="#2d3436" stroke-width="2.5"/>
  <circle cx="482" cy="298" r="5" fill="#ffd93d" stroke="#2d3436" stroke-width="2"/>

  <!-- Tiny plus doodle near the drag path -->
  <g transform="translate(330 352)">
    <path d="M -8 0 H 8 M 0 -8 V 8" class="doodle-outline" stroke="#f5a8b8" stroke-width="3"/>
    <path d="M -5 0 H 5 M 0 -5 V 5" class="doodle-outline" stroke="#2d3436" stroke-width="2"/>
  </g>

  <!-- Install hint -->
  <text x="330" y="382" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="500"
        fill="#636e72">Drag plusplus into the Applications folder to install</text>
</svg>
