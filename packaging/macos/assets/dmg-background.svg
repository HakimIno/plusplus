<?xml version="1.0" encoding="UTF-8"?>
<!-- Background for the installer DMG window (660x400 points).
     Icon slots in make-dmg.sh: app at (165,185), Applications at (495,185) —
     the arrow below bridges those two slots. Rendered to background.tiff
     (1x + 2x) by build-background.sh; re-run it after editing this file. -->
<svg width="660" height="400" viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbfbfc"/>
      <stop offset="1" stop-color="#f1f3f6"/>
    </linearGradient>
  </defs>

  <rect width="660" height="400" fill="url(#bg)"/>

  <!-- App name, quietly at the top -->
  <text x="330" y="64" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="26" font-weight="600"
        fill="#3b4451">plusplus</text>

  <!-- Drag stroke between the two icon slots (no arrowhead — like a drag gesture) -->
  <path d="M 185 300 C 255 298, 405 368, 475 305"
        fill="none" stroke="#4da3e8" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Install hint at the bottom -->
  <text x="330" y="368" text-anchor="middle"
        font-family="Helvetica, Arial, sans-serif" font-size="13"
        fill="#9aa3af">Drag plusplus into the Applications folder to install</text>
</svg>
